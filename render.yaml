services:
  - type: web
    name: caloriescan-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HF_TOKEN
        sync: false
      - key: HF_MODEL
        value: nateraw/food
      - key: CORS_ORIGIN
        sync: false
